<!DOCTYPE html>
<html>
<head>
<title>Generate Wikipedia template Pagesize table</title>
<style>
html { font-family: sans-serif }
</style>
<script>
// no indentation :-( https://github.com/tc39/proposal-string-dedent/
function generate() {

const count = parseInt(document.getElementById('count').value);

let text =
`{| class="wikitable sortable"
! Title
! Size
|-
| [[:{{{1}}}]]
| {{PAGESIZE:{{{1}}}}}
|-<!--
-->`;

for (let i = 2; i <= count; i++) {

text +=
`{{#ifexist:{{{${i}|}}}
   |<span style="display:none;">test</span>
{{!}}-
{{!}} [[:{{{${i}}}}]]
{{!}} {{PAGESIZE:{{{${i}}}}}}
   |}}<!--
-->`;

}

text +=
`
|}<noinclude>
{{Documentation}}</noinclude>
`;

document.getElementById('text').value = text;
}
</script>
</head>
<body onload="generate()">

This app generates the code for
<a target="_blank" href="https://en.wikipedia.org/wiki/Template:Pagesize_table">Template:Pagesize table</a>
on the English Wikipedia.
<br/>

Enter the number of entries, press the button,
and copy the result into the template.
<br/>

<input id="count" type="number" value="1000"/>
<br/>

<button onclick="generate()">Generate</button>
<br/>

<textarea id="text" rows="40" cols="80">
</textarea>

</body>
</html>
